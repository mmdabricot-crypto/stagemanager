<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>StageManager — DABRIKSON</title>
<style>
:root{
  --green:#1D9E75;--green-dk:#085041;--green-lt:#E1F5EE;
  --blue:#185FA5;--blue-dk:#0C447C;--blue-lt:#E6F1FB;
  --amber:#BA7517;--red:#A32D2D;--purple:#534AB7;
  --gray:#5F5E5A;--gray-lt:#F1EFE8;
  --surface:#fff;--bg:#F5F5F3;
  --border:rgba(0,0,0,0.1);--text:#1a1a18;--text2:#5F5E5A;--text3:#888780;
  --shadow:0 1px 4px rgba(0,0,0,0.08);--shadow-lg:0 4px 20px rgba(0,0,0,0.12);
  --radius:8px;--radius-lg:12px;--font:'DM Sans',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column}
button{font-family:var(--font);cursor:pointer}
input,select{font-family:var(--font)}

/* LOGIN */
#screen-login{display:flex;align-items:center;justify-content:center;height:100vh}
.login-card{background:var(--surface);border-radius:16px;box-shadow:var(--shadow-lg);padding:2.5rem;width:100%;max-width:340px;text-align:center}
.login-logo{font-size:26px;font-weight:800;letter-spacing:-1px;margin-bottom:4px}
.login-logo span{color:var(--green)}
.login-sub{font-size:13px;color:var(--text2);margin-bottom:2rem}
.profile-btn{width:100%;padding:13px;border:1.5px solid var(--border);border-radius:var(--radius);background:var(--surface);color:var(--text);font-size:14px;font-weight:500;margin-bottom:10px;display:flex;align-items:center;gap:12px;transition:all .15s;cursor:pointer}
.profile-btn:hover{border-color:var(--green);background:var(--green-lt)}
.profile-av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff;flex-shrink:0}

/* APP */
#screen-app{display:none;flex:1;flex-direction:column;height:100vh;overflow:hidden}
.topbar{height:46px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 1rem;gap:8px;flex-shrink:0}
.logo{font-size:15px;font-weight:700;letter-spacing:-.3px}
.logo span{color:var(--green)}
.badge-sm{font-size:11px;background:var(--green-lt);color:var(--green-dk);padding:2px 8px;border-radius:10px;font-weight:500}
.tsep{width:1px;height:18px;background:var(--border);flex-shrink:0}
.btn{padding:5px 11px;border-radius:var(--radius);border:1.5px solid var(--border);background:var(--surface);color:var(--text2);font-size:12px;font-weight:500;cursor:pointer;transition:all .12s;white-space:nowrap}
.btn:hover{background:var(--gray-lt);color:var(--text)}
.btn.primary{background:var(--green);color:#fff;border-color:var(--green)}
.btn.primary:hover{background:var(--green-dk)}
.btn.blue{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn.warn{background:var(--amber);color:#fff;border-color:var(--amber)}
.btn.danger{background:var(--red);color:#fff;border-color:var(--red)}
.btn.sm{padding:3px 8px;font-size:11px}
.sel{padding:5px 10px;border:1.5px solid var(--border);border-radius:var(--radius);font-size:12px;background:var(--surface);color:var(--text)}
#sync-dot{width:7px;height:7px;border-radius:50%;background:var(--gray);display:inline-block;margin-right:3px}
#sync-dot.ok{background:var(--green)}

/* LAYOUT */
.app-body{display:flex;flex:1;overflow:hidden;min-height:0}
#sidebar{width:200px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.stab-row{display:flex;border-bottom:1px solid var(--border)}
.stab{flex:1;padding:7px 4px;border:none;background:none;font-size:11px;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px}
.stab.active{color:var(--green-dk);border-bottom-color:var(--green);font-weight:600}
.stab:hover{background:var(--gray-lt)}
#stab-lib{flex:1;overflow-y:auto}
#stab-props{flex:1;overflow-y:auto;display:none}
.lib-search{padding:7px 8px;border-bottom:1px solid var(--border)}
.lib-search input{width:100%;padding:4px 8px;border:1.5px solid var(--border);border-radius:6px;font-size:12px;background:var(--bg)}
.lib-cat{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);padding:8px 10px 3px}
.lib-item{display:flex;align-items:center;gap:8px;padding:6px 10px;cursor:pointer;border-radius:6px;margin:1px 5px;transition:background .1s;font-size:12px;user-select:none}
.lib-item:hover{background:var(--gray-lt)}
.lib-icon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.lib-name{font-weight:500;font-size:12px}
.lib-sub{font-size:10px;color:var(--text3)}
.prop-section{padding:10px}
.prop-label{font-size:11px;color:var(--text3);margin-bottom:3px;display:block}
.prop-field{margin-bottom:10px}
.prop-input{width:100%;padding:5px 8px;border:1.5px solid var(--border);border-radius:6px;font-size:12px;background:var(--bg)}
.no-sel{padding:20px 10px;text-align:center;font-size:12px;color:var(--text3)}

/* CANVAS ZONE */
#canvas-zone{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#draw-toolbar{height:38px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 8px;gap:3px;flex-shrink:0;overflow-x:auto}
.tool-btn{padding:4px 9px;border:1.5px solid transparent;border-radius:6px;background:none;color:var(--text2);font-size:12px;cursor:pointer;white-space:nowrap;transition:all .1s}
.tool-btn:hover{background:var(--gray-lt);color:var(--text)}
.tool-btn.active{background:var(--green-lt);color:var(--green-dk);border-color:var(--green);font-weight:600}
.tsep2{width:1px;height:16px;background:var(--border);flex-shrink:0;margin:0 2px}
#canvas-wrap{flex:1;position:relative;overflow:hidden;background:#CDD5DE}
#stage-canvas{display:block;cursor:default}
#infobar{height:28px;background:var(--surface);border-top:1px solid var(--border);display:flex;align-items:center;padding:0 10px;gap:10px;font-size:11px;color:var(--text3);flex-shrink:0}
.ib-sep{width:1px;height:12px;background:var(--border)}

/* MODAL */
#modal-root .overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;display:flex;align-items:center;justify-content:center;padding:1rem}
.modal{background:var(--surface);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);width:100%;max-width:480px}
.modal-head{padding:1rem 1.25rem;border-bottom:1px solid var(--border);font-weight:600;font-size:15px}
.modal-body{padding:1.25rem}
.modal-foot{padding:.75rem 1.25rem;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
.field{margin-bottom:12px}
.field label{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--text2);margin-bottom:4px}
.field input,.field select,.field textarea{width:100%;padding:7px 10px;border:1.5px solid var(--border);border-radius:var(--radius);font-size:13px;background:var(--surface)}
.field-row{display:flex;gap:10px}.field-row .field{flex:1}

/* TOAST */
#toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(60px);background:#1a1a18;color:#fff;padding:9px 18px;border-radius:20px;font-size:13px;z-index:999;opacity:0;transition:all .22s;pointer-events:none;white-space:nowrap}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="screen-login">
  <div class="login-card">
    <div class="login-logo">Stage<span>Manager</span></div>
    <div class="login-sub">Plan de scène pro · DABRIKSON</div>
    <div id="profile-list"></div>
    <div style="font-size:11px;color:var(--text3);margin-top:1rem">Données partagées avec SonoManager</div>

</div>

<!-- APP -->
<div id="screen-app">
  <div class="topbar">
    <div class="logo">Stage<span>Manager</span></div>
    <span class="badge-sm">DABRIKSON</span>
    <div class="tsep"></div>
    <select class="sel" id="scene-select" onchange="loadSceneByName(this.value)" style="max-width:180px">
      <option value="">— Nouvelle scène —</option>
    </select>
    <button class="btn primary" onclick="newScene()">＋ Nouveau</button>
    <button class="btn" onclick="saveScene()">💾 Sauver</button>
    <button class="btn danger btn-sm" onclick="deleteScene()">🗑</button>
    <div class="tsep"></div>
    <button class="btn blue" onclick="exportPDF()">⬇ PDF</button>
    <button class="btn" onclick="importFromFiche()">📋 Fiche tech</button>
    <div class="tsep"></div>
    <span><span id="sync-dot"></span><span id="sync-label" style="font-size:11px;color:var(--text2)">Firebase</span></span>
    <span id="topbar-name" style="font-size:12px;color:var(--text2);margin-left:4px"></span>
    <button class="btn sm" onclick="logout()">Changer</button>
  </div>

  <div class="app-body">
    <!-- SIDEBAR -->
    <div id="sidebar">
      <div class="stab-row">
        <button class="stab active" onclick="showSideTab('lib',this)">Bibliothèque</button>
        <button class="stab" onclick="showSideTab('custom',this)">📁 Mes images</button>
        <button class="stab" onclick="showSideTab('props',this)">Propriétés</button>
      </div>
      <div id="stab-lib">
        <div class="lib-search"><input type="text" id="lib-search" placeholder="Rechercher…" oninput="filterLib(this.value)"></div>

      <div id="stab-custom" style="display:none;flex-direction:column;flex:1;overflow:hidden">

          <button class="btn primary" onclick="importCustomImage()" style="width:100%;font-size:12px">＋ Importer une image</button>
          <div style="font-size:10px;color:var(--text3);margin-top:5px;text-align:center">PNG, JPG, WebP, SVG</div>

        <div id="custom-lib" style="flex:1;overflow-y:auto"></div>
      </div>
      <div id="stab-props">
        <div id="prop-panel"><div class="no-sel">Sélectionnez un élément</div></div>
      </div>
    </div>

    <!-- CANVAS -->
    <div id="canvas-zone">
      <div id="draw-toolbar">
        <button class="tool-btn active" id="tool-select" onclick="setTool('select')">↖ Sélect.</button>
        <button class="tool-btn" id="tool-line" onclick="setTool('line')">⌇ Câble</button>
        <button class="tool-btn" id="tool-rect" onclick="setTool('rect')">▭ Zone</button>
        <button class="tool-btn" id="tool-text" onclick="setTool('text')">T Texte</button>
        <div class="tsep2"></div>
        <button class="tool-btn" id="btn-undo" onclick="sceneUndo()" style="opacity:.4">↩</button>
        <button class="tool-btn" id="btn-redo" onclick="sceneRedo()" style="opacity:.4">↪</button>
        <div class="tsep2"></div>
        <button class="tool-btn" onclick="rotateSelected()">↻ Rot.</button>
        <button class="tool-btn" onclick="flipSelected()">⇄ Miroir</button>
        <button class="tool-btn" onclick="deleteSelected()" style="color:var(--red)">🗑 Supp.</button>
        <div class="tsep2"></div>
        <select class="sel" id="scene-size" onchange="applyScenePreset()" style="font-size:11px">
          <option value="6,5">Club (6×5m)</option>
          <option value="10,7">Salle (10×7m)</option>
          <option value="12,8" selected>Concert (12×8m)</option>
          <option value="16,10">Grande scène (16×10m)</option>
          <option value="20,12">Festival (20×12m)</option>
          <option value="custom">Personnalisé…</option>
        </select>
        <div class="tsep2"></div>
        <button class="tool-btn active" id="btn-snap" onclick="toggleSnap()">⊹ Snap</button>
        <button class="tool-btn active" id="btn-labels" onclick="toggleLabels()">🏷 Labels</button>
        <button class="tool-btn active" id="btn-grid" onclick="toggleGrid()">⊞ Grille</button>
      </div>
      <div id="canvas-wrap">
        <canvas id="stage-canvas"></canvas>
      </div>
      <div id="infobar">
        <span id="ib-pos">x:0m y:0m</span>
        <div class="ib-sep"></div>
        <span id="ib-sel">Aucun élément sélectionné</span>
        <div class="ib-sep"></div>
        <span style="background:var(--gray-lt);padding:1px 7px;border-radius:10px;font-size:10px">← Jardin</span>
        <span style="background:var(--gray-lt);padding:1px 7px;border-radius:10px;font-size:10px">Cour →</span>
        <span style="margin-left:auto;background:var(--gray-lt);padding:1px 7px;border-radius:10px;font-size:10px" id="ib-count">0 éléments</span>
        <span style="background:var(--gray-lt);padding:1px 7px;border-radius:10px;font-size:10px" id="ib-size">12×8m</span>
      </div>
    </div>
  </div>
</div>

<div id="modal-root"></div>
<div id="toast"></div>

<!-- Firebase -->
<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import{getFirestore,doc,onSnapshot,setDoc}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
const cfg={apiKey:"AIzaSyCr2SkR1XbxarMV8Q5_Kv32akcTW3vkTK8",authDomain:"sonomanager-e8f20.firebaseapp.com",projectId:"sonomanager-e8f20",storageBucket:"sonomanager-e8f20.firebasestorage.app",messagingSenderId:"637457240824",appId:"1:637457240824:web:c83f7bed2aedd066c5a10d"};
const app=initializeApp(cfg);
const db=getFirestore(app);
window._db=db;window._doc=doc;window._setDoc=setDoc;window._onSnapshot=onSnapshot;
window.dispatchEvent(new Event('firebase-ready'));
</script>

<script>
// ══════════════════════════════════════════════════
//  STAGEMANAGER PRO — DABRIKSON
// ══════════════════════════════════════════════════

// ── État global ──
let S={profiles:[],scenes:{},fiches:[],stageScenes:{}};
let currentUser=null;
let saveTO=null;

// Profils par défaut
const DEFAULT_PROFILES=[
  {id:1,name:'Admin',color:'#1D9E75'},
  {id:2,name:'Tech 1',color:'#185FA5'},
  {id:3,name:'Tech 2',color:'#BA7517'},
];

// ── Firebase ──
window.addEventListener('firebase-ready',()=>{
  const docRef=window._doc(window._db,'sonomanager','data');
  window._onSnapshot(docRef,snap=>{
    if(snap.exists()){
      const d=snap.data();
      S=Object.assign({profiles:[],scenes:{},fiches:[],stageScenes:{}},d);
    }
    setSyncStatus('ok');
    renderProfiles();
    if(currentUser)updateSceneSelect();
  });
  window._save=async()=>{
    setSyncStatus('sync');
    await window._setDoc(window._doc(window._db,'sonomanager','data'),S);
    setSyncStatus('ok');
  };
});

function save(){
  clearTimeout(saveTO);
  saveTO=setTimeout(()=>{if(window._save)window._save();},800);
}

function setSyncStatus(s){
  const d=document.getElementById('sync-dot');
  if(d){d.className=s;document.getElementById('sync-label').textContent=s==='sync'?'Sync…':'Firebase';}
}

// ── LOGIN ──
function renderProfiles(){
  const list=document.getElementById('profile-list');if(!list)return;
  const profiles=(S.profiles&&S.profiles.length)?S.profiles:DEFAULT_PROFILES;
  list.innerHTML=profiles.map(p=>`
    <button class="profile-btn" onclick="selectProfile(${p.id})">
      <div class="profile-av" style="background:${p.color}">${p.name[0]}</div>${p.name}
    </button>`).join('');
}

function selectProfile(id){
  const profiles=(S.profiles&&S.profiles.length)?S.profiles:DEFAULT_PROFILES;
  currentUser=profiles.find(p=>p.id===id);
  if(!currentUser)return;
  document.getElementById('screen-login').style.display='none';
  document.getElementById('screen-app').style.display='flex';
  document.getElementById('topbar-name').textContent=currentUser.name;
  initApp();
}

function logout(){
  currentUser=null;
  document.getElementById('screen-app').style.display='none';
  document.getElementById('screen-login').style.display='flex';
}

// Afficher les profils immédiatement
renderProfiles();

// ── INIT APP ──
let appInited=false;
function initApp(){
  if(appInited)return;
  appInited=true;
  buildLib();
  updateSceneSelect();
  // Canvas après rendu
  requestAnimationFrame(()=>requestAnimationFrame(()=>initCanvas()));
}

// ════════════════════════════════════════════════
//  BIBLIOTHÈQUE
// ════════════════════════════════════════════════
const LIBDATA=[
  {cat:'Micros & Son',items:[
    {type:'micro',name:'Micro filaire',emoji:'🎤',color:'#1D9E75'},
    {type:'micro-stand',name:'Pied de micro',emoji:'🎙',color:'#888780'},
    {type:'hf',name:'Micro HF',emoji:'📡',color:'#BA7517'},
    {type:'iem',name:'IEM / Oreillette',emoji:'🎧',color:'#534AB7'},
    {type:'di',name:'DI Box',emoji:'🔌',color:'#5F5E5A'},
    {type:'multipaire',name:'Multipaire',emoji:'🔗',color:'#444444'},
  ]},
  {cat:'Enceintes & Amplis',items:[
    {type:'retour',name:'Retour scène',emoji:'📢',color:'#185FA5'},
    {type:'hp-main',name:'Enceinte principale',emoji:'🔊',color:'#185FA5'},
    {type:'sub',name:'Caisson de basse',emoji:'⬛',color:'#2C2C2A'},
    {type:'amp',name:'Ampli guitare',emoji:'🎸',color:'#A32D2D'},
    {type:'amp-basse',name:'Ampli basse',emoji:'🎸',color:'#A32D2D'},
  ]},
  {cat:'Instruments',items:[
    {type:'guitare',name:'Guitare électrique',emoji:'🎸',color:'#534AB7'},
    {type:'basse',name:'Basse électrique',emoji:'🎸',color:'#534AB7'},
    {type:'clavier',name:'Clavier',emoji:'🎹',color:'#BA7517'},
    {type:'clavier2',name:'Double clavier',emoji:'🎹',color:'#BA7517'},
    {type:'contrebasse',name:'Contrebasse',emoji:'🎻',color:'#085041'},
    {type:'violon',name:'Violon',emoji:'🎻',color:'#633806'},
    {type:'saxophone',name:'Saxophone',emoji:'🎷',color:'#854F0B'},
    {type:'trompette',name:'Trompette',emoji:'🎺',color:'#854F0B'},
    {type:'trombone',name:'Trombone',emoji:'🎺',color:'#854F0B'},
  ]},
  {cat:'Percussions',items:[
    {type:'batterie',name:'Batterie',emoji:'🥁',color:'#A32D2D'},
    {type:'cajun',name:'Cajun',emoji:'📦',color:'#633806'},
    {type:'congas',name:'Congas',emoji:'🥁',color:'#854F0B'},
    {type:'djembe',name:'Djembé',emoji:'🥁',color:'#854F0B'},
    {type:'tom-basse',name:'Tom basse',emoji:'🥁',color:'#A32D2D'},
    {type:'cloche',name:'Cowbell',emoji:'🔔',color:'#854F0B'},
  ]},
  {cat:'Lumière',items:[
    {type:'par',name:'PAR LED',emoji:'💡',color:'#F4A01C'},
    {type:'lyre',name:'Lyre',emoji:'🔦',color:'#185FA5'},
    {type:'strobe',name:'Stroboscope',emoji:'⚡',color:'#A32D2D'},
    {type:'barre-led',name:'Barre LED',emoji:'💡',color:'#1D9E75'},
  ]},
  {cat:'Scène & Mobilier',items:[
    {type:'podium',name:'Podium / Riser',emoji:'⬛',color:'#888780'},
    {type:'table',name:'Table',emoji:'🟫',color:'#5F5E5A'},
    {type:'chaise',name:'Chaise',emoji:'🪑',color:'#888780'},
    {type:'foh',name:'Régie FOH',emoji:'🎛',color:'#0047AB'},
    {type:'backline',name:'Backline rack',emoji:'🗄',color:'#5F5E5A'},
    {type:'tapis',name:'Tapis de scène',emoji:'🟩',color:'#888780'},
  ]},
];

function buildLib(filter=''){
  const f=filter.toLowerCase();
  const el=document.getElementById('lib-list');
  if(!el)return;
  let html='';
  LIBDATA.forEach(cat=>{
    const items=cat.items.filter(it=>!f||it.name.toLowerCase().includes(f));
    if(!items.length)return;
    html+=`<div class="lib-cat">${cat.cat}</div>`;
    items.forEach(it=>{
      html+=`<div class="lib-item" data-type="${it.type}">
        <div class="lib-icon" style="background:${it.color}22;border:1.5px solid ${it.color}66">${it.emoji}</div>
        <div><div class="lib-name">${it.name}</div></div>
      </div>`;
    });
  });
  el.innerHTML=html||'<div style="padding:12px;font-size:12px;color:var(--text3)">Aucun résultat</div>';
  // Attacher les events de clic — délégation sur le conteneur
  el.onclick=null;
  el.addEventListener('click',onLibClick,{once:false});
  el.addEventListener('dragstart',onLibDragStart,{once:false});
}

function filterLib(v){buildLib(v);}

// Un seul handler pour tous les clics sur la lib
let libClickCooldown=false;
function onLibClick(e){
  if(libClickCooldown)return;
  const item=e.target.closest('.lib-item');
  if(!item)return;
  const type=item.dataset.type;
  if(!type)return;
  libClickCooldown=true;
  setTimeout(()=>{libClickCooldown=false;},300);
  const x=parseFloat((sceneW*0.15+Math.random()*sceneW*0.7).toFixed(2));
  const y=parseFloat((sceneH*0.2+Math.random()*sceneH*0.6).toFixed(2));
  addElement(type,x,y);
}

let libDragType=null;
function onLibDragStart(e){
  const item=e.target.closest('.lib-item');
  if(!item)return;
  libDragType=item.dataset.type;
  try{e.dataTransfer.setData('text',libDragType);}catch(_){}
  e.dataTransfer.effectAllowed='copy';
}

function showSideTab(tab,btn){
  document.querySelectorAll('.stab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('stab-lib').style.display=tab==='lib'?'flex':'none';
  document.getElementById('stab-lib').style.flexDirection='column';
  document.getElementById('stab-custom').style.display=tab==='custom'?'flex':'none';
  document.getElementById('stab-props').style.display=tab==='props'?'block':'none';
  if(tab==='custom')renderCustomLib();
}

// ════════════════════════════════════════════════
//  CANVAS
// ════════════════════════════════════════════════
let canvas,ctx,wrap;
let W=800,H=500,sceneW=12,sceneH=8;
let SR={x:0,y:0,w:0,h:0,scale:50};
let snapOn=true,showLabels=true,showGrid=true;
let tool='select';
let elements=[],selected=null,multiSel=[];
let dragging=false,dragOff={x:0,y:0};
let drawStart={x:0,y:0},drawCur={x:0,y:0},isDrawing=false;
let lineStart=null;
let hist=[],histIdx=-1;
let sceneName='';
let dropCooldown=false;

function initCanvas(){
  canvas=document.getElementById('stage-canvas');
  wrap=document.getElementById('canvas-wrap');
  if(!canvas||!wrap){setTimeout(initCanvas,200);return;}
  ctx=canvas.getContext('2d');
  resizeCanvas();
  // Events canvas
  canvas.addEventListener('mousedown',onDown);
  canvas.addEventListener('mousemove',onMove);
  canvas.addEventListener('mouseup',onUp);
  canvas.addEventListener('dblclick',onDblClick);
  // Drop — sur le wrap seulement
  wrap.addEventListener('dragover',e=>e.preventDefault());
  wrap.addEventListener('drop',onDrop);
  // Clavier
  document.addEventListener('keydown',onKey);
  window.addEventListener('resize',resizeCanvas);
  histPush();
  draw();
  toast('StageManager prêt !');
}

function resizeCanvas(){
  if(!wrap||!canvas)return;
  W=wrap.clientWidth||800;H=wrap.clientHeight||500;
  if(W<50||H<50){setTimeout(resizeCanvas,200);return;}
  canvas.width=W;canvas.height=H;
  computeScene();
  if(ctx)draw();
}

function computeScene(){
  const mg=65,top=45;
  const sx=(W-mg*2)/sceneW,sy=(H-mg-top)/sceneH;
  const sc=Math.min(sx,sy);
  const sw=sceneW*sc,sh=sceneH*sc;
  SR={x:(W-sw)/2,y:top,w:sw,h:sh,scale:sc};
  document.getElementById('ib-size').textContent=sceneW+'×'+sceneH+'m';
}

function m2px(m){return m*SR.scale;}
function toCanvas(mx,my){return{x:SR.x+mx*SR.scale,y:SR.y+my*SR.scale};}
function toMetre(cx,cy){return{x:(cx-SR.x)/SR.scale,y:(cy-SR.y)/SR.scale};}
function snapV(v){return snapOn?Math.round(v/0.5)*0.5:v;}
function clampScene(mx,my){return{x:Math.max(0.3,Math.min(sceneW-0.3,mx)),y:Math.max(0.3,Math.min(sceneH-0.3,my))};}

function getTypeColor(type){
  const t=LIBDATA.flatMap(c=>c.items).find(i=>i.type===type);
  return t?t.color:'#888780';
}
function getTypeEmoji(type){
  const t=LIBDATA.flatMap(c=>c.items).find(i=>i.type===type);
  return t?t.emoji:'⬛';
}
function getTypeLabel(type){
  const t=LIBDATA.flatMap(c=>c.items).find(i=>i.type===type);
  return t?t.name:type;
}

// ── DRAW ──
function draw(){
  if(!ctx)return;
  ctx.clearRect(0,0,W,H);
  // Fond général
  ctx.fillStyle='#C8D0D8';ctx.fillRect(0,0,W,H);
  const{x,y,w,h,scale}=SR;
  // Grille
  if(showGrid){
    ctx.strokeStyle='rgba(255,255,255,0.25)';ctx.lineWidth=0.5;
    for(let gx=0;gx<=sceneW;gx+=1){const px=x+gx*scale;ctx.beginPath();ctx.moveTo(px,y);ctx.lineTo(px,y+h);ctx.stroke();}
    for(let gy=0;gy<=sceneH;gy+=1){const py=y+gy*scale;ctx.beginPath();ctx.moveTo(x,py);ctx.lineTo(x+w,py);ctx.stroke();}
    ctx.fillStyle='rgba(255,255,255,0.3)';ctx.font='9px sans-serif';ctx.textAlign='center';
    for(let gx=0;gx<=sceneW;gx+=1)ctx.fillText(gx+'m',x+gx*scale,y-5);
    ctx.textAlign='right';
    for(let gy=0;gy<=sceneH;gy+=1)ctx.fillText(gy+'m',x-6,y+gy*scale+4);
  }
  // Fond scène (plancher en bois)
  ctx.fillStyle='#F0EAD8';ctx.fillRect(x,y,w,h);
  // Bandes plancher
  ctx.strokeStyle='rgba(180,155,110,0.3)';ctx.lineWidth=0.8;
  for(let gx=0;gx<=sceneW;gx+=1){const px=x+gx*scale;ctx.beginPath();ctx.moveTo(px,y);ctx.lineTo(px,y+h);ctx.stroke();}
  // Bordure scène
  ctx.strokeStyle='#8A7050';ctx.lineWidth=2;ctx.strokeRect(x,y,w,h);
  // Avant-scène
  ctx.fillStyle='rgba(140,112,80,0.2)';ctx.fillRect(x,y+h,w,20);
  ctx.fillStyle='rgba(100,80,50,0.6)';ctx.font='bold 10px sans-serif';ctx.textAlign='center';
  ctx.fillText('— AVANT-SCÈNE / PUBLIC —',x+w/2,y+h+14);
  // Labels scène
  ctx.font='bold 11px sans-serif';ctx.fillStyle='rgba(100,80,50,0.5)';
  ctx.fillText('⬆ LOINTAIN',x+w/2,y-18);
  ctx.save();ctx.translate(x-28,y+h/2);ctx.rotate(-Math.PI/2);ctx.fillText('JARDIN ▶',0,0);ctx.restore();
  ctx.save();ctx.translate(x+w+28,y+h/2);ctx.rotate(Math.PI/2);ctx.fillText('◀ COUR',0,0);ctx.restore();

  // Lignes câbles
  elements.filter(e=>e.type==='line').forEach(e=>drawLine(e));
  // Rectangles zones
  elements.filter(e=>e.type==='rect').forEach(e=>drawRect(e));
  // Textes
  elements.filter(e=>e.type==='text').forEach(e=>drawText(e));
  // Icônes instruments
  elements.filter(e=>!['line','rect','text'].includes(e.type)).forEach(e=>drawIcon(e));

  // Aperçu ligne en cours
  if(tool==='line'&&lineStart){
    ctx.strokeStyle='rgba(100,100,100,0.5)';ctx.lineWidth=1.5;ctx.setLineDash([5,4]);
    const s=toCanvas(lineStart.x,lineStart.y);
    ctx.beginPath();ctx.moveTo(s.x,s.y);ctx.lineTo(drawCur.x,drawCur.y);ctx.stroke();
    ctx.setLineDash([]);
  }
  // Aperçu rectangle en cours
  if(tool==='rect'&&isDrawing){
    ctx.strokeStyle='#185FA5';ctx.lineWidth=1.5;ctx.setLineDash([4,3]);
    ctx.strokeRect(drawStart.x,drawStart.y,drawCur.x-drawStart.x,drawCur.y-drawStart.y);
    ctx.setLineDash([]);
  }

  document.getElementById('ib-count').textContent=elements.filter(e=>!['line','rect','text'].includes(e.type)).length+' éléments';
}

function drawLine(e){
  const s=toCanvas(e.x,e.y),en=toCanvas(e.x2||e.x,e.y2||e.y);
  ctx.save();
  ctx.strokeStyle=e.color||'rgba(80,60,40,0.5)';ctx.lineWidth=1.5;ctx.setLineDash([6,4]);
  ctx.beginPath();ctx.moveTo(s.x,s.y);ctx.lineTo(en.x,en.y);ctx.stroke();ctx.setLineDash([]);
  if(e===selected){
    ctx.strokeStyle='rgba(24,95,165,0.7)';ctx.lineWidth=2;ctx.setLineDash([3,2]);
    ctx.beginPath();ctx.moveTo(s.x,s.y);ctx.lineTo(en.x,en.y);ctx.stroke();ctx.setLineDash([]);
    [s,en].forEach(p=>{ctx.fillStyle='#fff';ctx.strokeStyle='#185FA5';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(p.x,p.y,5,0,Math.PI*2);ctx.fill();ctx.stroke();});
  }
  ctx.restore();
}

function drawRect(e){
  const p=toCanvas(e.x,e.y);
  const pw=m2px(e.rw||2),ph=m2px(e.rh||1);
  ctx.save();ctx.translate(p.x+pw/2,p.y+ph/2);
  if(e.rotation)ctx.rotate(e.rotation*Math.PI/180);
  ctx.fillStyle=e.fill||'rgba(180,155,110,0.25)';
  ctx.strokeStyle=e===selected?'#185FA5':e.color||'#8A7050';
  ctx.lineWidth=e===selected?2:1.5;
  ctx.fillRect(-pw/2,-ph/2,pw,ph);ctx.strokeRect(-pw/2,-ph/2,pw,ph);
  if(showLabels&&e.label){
    ctx.fillStyle=e===selected?'#185FA5':'#5F5E5A';
    ctx.font=`bold ${Math.max(10,Math.min(13,pw/5))}px sans-serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(e.label,0,0);
  }
  ctx.restore();
}

function drawText(e){
  const p=toCanvas(e.x,e.y);
  ctx.save();ctx.translate(p.x,p.y);
  if(e.rotation)ctx.rotate(e.rotation*Math.PI/180);
  ctx.fillStyle=e.color||'#1a1a18';
  ctx.font=`${e.bold?'bold ':''}${e.size||13}px sans-serif`;
  ctx.textAlign='left';ctx.textBaseline='top';ctx.fillText(e.text||'',0,0);
  if(e===selected){
    const m=ctx.measureText(e.text||'');
    ctx.strokeStyle='rgba(24,95,165,0.5)';ctx.lineWidth=1;ctx.setLineDash([3,2]);
    ctx.strokeRect(-3,-3,m.width+6,(e.size||13)+8);ctx.setLineDash([]);
  }
  ctx.restore();
}

function drawIcon(e){
  const p=toCanvas(e.x,e.y);
  const isSel=e===selected||multiSel.includes(e);
  ctx.save();
  ctx.translate(p.x,p.y);
  if(e.rotation)ctx.rotate(e.rotation*Math.PI/180);
  if(e.flip)ctx.scale(-1,1);

  // Image personnalisée
  if(e.type==='custom-img'){
    const scale=(e.scale||1);
    const size=56*scale;
    const img=_imgCache[e.customId];
    // Ombre
    ctx.fillStyle='rgba(0,0,0,0.15)';
    ctx.beginPath();ctx.ellipse(2,size/2+6,size/2,8,0,0,Math.PI*2);ctx.fill();
    if(img){
      // Fond blanc
      ctx.fillStyle='rgba(255,255,255,0.9)';
      ctx.beginPath();ctx.roundRect(-size/2,-size/2,size,size,6);ctx.fill();
      // Image
      ctx.drawImage(img,-size/2,-size/2,size,size);
    }else{
      // Placeholder pendant le chargement
      ctx.fillStyle='var(--gray-lt)';
      ctx.beginPath();ctx.roundRect(-size/2,-size/2,size,size,6);ctx.fill();
      ctx.fillStyle='#888';ctx.font='10px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('⏳',0,0);
      // Déclencher le chargement
      getImageForCanvas(e.customId).then(()=>draw());
    }
    // Sélection
    if(isSel){
      ctx.strokeStyle='#185FA5';ctx.lineWidth=2.5;ctx.setLineDash([4,3]);
      ctx.beginPath();ctx.roundRect(-size/2-4,-size/2-4,size+8,size+8,8);ctx.stroke();ctx.setLineDash([]);
    }
    // Label
    if(showLabels&&e.label){
      ctx.font='600 11px sans-serif';ctx.textAlign='center';ctx.textBaseline='top';
      const lw=ctx.measureText(e.label).width;
      ctx.fillStyle='rgba(255,255,255,0.9)';
      ctx.beginPath();ctx.roundRect(-lw/2-5,size/2+2,lw+10,15,4);ctx.fill();
      ctx.fillStyle='rgba(20,20,18,0.9)';ctx.fillText(e.label,0,size/2+4);
    }
    ctx.restore();
    return;
  }

  const col=e.color||getTypeColor(e.type);

  // Ombre portée
  ctx.fillStyle='rgba(0,0,0,0.15)';
  ctx.beginPath();ctx.ellipse(2,34,28,7,0,0,Math.PI*2);ctx.fill();

  // Sélection halo
  if(isSel){
    ctx.strokeStyle='#185FA5';ctx.lineWidth=3;ctx.setLineDash([4,3]);
    ctx.beginPath();ctx.arc(0,0,34,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);
  }

  // Dessin de l'instrument
  drawInstrument(ctx,e.type,col);

  // Badge canal
  if(e.chan){
    ctx.fillStyle='#185FA5';
    ctx.beginPath();ctx.arc(22,-22,10,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.font='bold 9px sans-serif';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('CH'+e.chan,22,-22);
  }

  // Label
  if(showLabels&&e.label){
    ctx.font='600 11px sans-serif';ctx.textAlign='center';ctx.textBaseline='top';
    const lw=ctx.measureText(e.label).width;
    ctx.fillStyle='rgba(255,255,255,0.9)';
    ctx.beginPath();ctx.roundRect(-lw/2-5,27,lw+10,15,4);ctx.fill();
    ctx.fillStyle='rgba(20,20,18,0.9)';ctx.fillText(e.label,0,29);
  }
  ctx.restore();
}

// ─────────────────────────────────────────────────
//  ILLUSTRATIONS INSTRUMENTS — canvas 2D
//  Tout est dessiné dans un repère centré sur (0,0)
//  Taille visible ~60px de haut
// ─────────────────────────────────────────────────
function drawInstrument(c,type,col){
  c.save();
  c.lineCap='round';c.lineJoin='round';
  const dk=(hex,a)=>darkenHex(hex,a);
  const lt=(hex,a)=>lightenHex(hex,a);

  switch(type){

  // ═══ BATTERIE (fidèle photo : corps métallique sombre, cymbales dorées) ═══
  case'batterie':{
    // Grosse caisse vue 3/4
    c.fillStyle='#1C1C1C';c.strokeStyle='#111';c.lineWidth=1.5;
    c.beginPath();c.ellipse(0,10,26,9,0,0,Math.PI*2);c.fill();c.stroke();
    c.fillStyle='#2A2A2A';c.strokeStyle='#111';
    c.beginPath();c.ellipse(0,0,26,9,0,0,Math.PI*2);c.fill();c.stroke();
    // Peau avant colorée
    c.fillStyle=col;c.beginPath();c.ellipse(0,0,22,7.5,0,0,Math.PI*2);c.fill();
    c.fillStyle=dk(col,30);c.beginPath();c.ellipse(0,0,13,4.5,0,0,Math.PI*2);c.fill();
    c.fillStyle='#111';c.beginPath();c.ellipse(0,0,5,1.8,0,0,Math.PI*2);c.fill();
    // Tom haut gauche
    c.fillStyle='#222';c.strokeStyle='#111';c.lineWidth=1;
    c.beginPath();c.ellipse(-26,0,8,3,0,0,Math.PI*2);c.fill();c.stroke();
    c.fillStyle='#2A2A2A';c.beginPath();c.ellipse(-26,-5,8,3,0,0,Math.PI*2);c.fill();c.stroke();
    c.fillStyle=col;c.beginPath();c.ellipse(-26,-5,6,2.2,0,0,Math.PI*2);c.fill();
    // Tom haut droit
    c.fillStyle='#222';c.strokeStyle='#111';
    c.beginPath();c.ellipse(20,-2,7,2.5,0,0,Math.PI*2);c.fill();c.stroke();
    c.fillStyle='#2A2A2A';c.beginPath();c.ellipse(20,-7,7,2.5,0,0,Math.PI*2);c.fill();c.stroke();
    c.fillStyle=col;c.beginPath();c.ellipse(20,-7,5.2,1.8,0,0,Math.PI*2);c.fill();
    // Floor tom (droite)
    c.fillStyle='#222';c.strokeStyle='#111';
    c.beginPath();c.ellipse(36,5,9,3.5,0,0,Math.PI*2);c.fill();c.stroke();
    c.fillStyle='#2A2A2A';c.beginPath();c.ellipse(36,-3,9,3.5,0,0,Math.PI*2);c.fill();c.stroke();
    c.fillStyle=col;c.beginPath();c.ellipse(36,-3,7,2.5,0,0,Math.PI*2);c.fill();
    // Pattes floor tom
    c.strokeStyle='#666';c.lineWidth=1.2;
    c.beginPath();c.moveTo(28,10);c.lineTo(26,20);c.stroke();
    c.beginPath();c.moveTo(44,10);c.lineTo(46,20);c.stroke();
    // Caisse claire (gauche) - blanche
    c.fillStyle='#333';c.strokeStyle='#bbb';c.lineWidth=1;
    c.beginPath();c.ellipse(-36,4,9,3,0,0,Math.PI*2);c.fill();c.stroke();
    c.fillStyle='#D8D8D8';c.strokeStyle='#bbb';
    c.beginPath();c.ellipse(-36,-1,9,3,0,0,Math.PI*2);c.fill();c.stroke();
    c.fillStyle='#C0C0C0';c.beginPath();c.ellipse(-36,-1,6.5,2,0,0,Math.PI*2);c.fill();
    // Stand caisse claire
    c.strokeStyle='#777';c.lineWidth=1.2;
    c.beginPath();c.moveTo(-36,6);c.lineTo(-36,16);c.stroke();
    c.beginPath();c.moveTo(-36,16);c.lineTo(-44,24);c.stroke();
    c.beginPath();c.moveTo(-36,16);c.lineTo(-28,24);c.stroke();
    // Cymbales (dorées, style photo)
    // HH
    c.fillStyle='#C8A030';c.strokeStyle='#9B7820';c.lineWidth=0.8;
    c.beginPath();c.ellipse(-44,-18,14,3.5,0.15,0,Math.PI*2);c.fill();c.stroke();
    c.fillStyle='#B89020';c.beginPath();c.ellipse(-44,-18,4,1.2,0.15,0,Math.PI*2);c.fill();
    c.strokeStyle='#777';c.lineWidth=1.2;
    c.beginPath();c.moveTo(-44,-14);c.lineTo(-42,24);c.stroke();
    // Ride
    c.fillStyle='#C8A030';c.strokeStyle='#9B7820';c.lineWidth=0.8;
    c.beginPath();c.ellipse(42,-18,16,4,-0.1,0,Math.PI*2);c.fill();c.stroke();
    c.fillStyle='#B89020';c.beginPath();c.ellipse(42,-18,5,1.5,-0.1,0,Math.PI*2);c.fill();
    c.strokeStyle='#777';c.lineWidth=1.2;
    c.beginPath();c.moveTo(42,-14);c.lineTo(44,24);c.stroke();
    // Crash
    c.fillStyle='#C8A030';c.strokeStyle='#9B7820';c.lineWidth=0.8;
    c.beginPath();c.ellipse(18,-20,12,3,-0.2,0,Math.PI*2);c.fill();c.stroke();
    c.strokeStyle='#777';c.lineWidth=1;
    c.beginPath();c.moveTo(18,-17);c.lineTo(20,24);c.stroke();
    // Pieds grosse caisse
    c.strokeStyle='#666';c.lineWidth=1.5;
    c.beginPath();c.moveTo(-18,16);c.lineTo(-24,24);c.stroke();
    c.beginPath();c.moveTo(18,16);c.lineTo(24,24);c.stroke();
    break;
  }

  // ═══ BASSE JAZZ BASS (fidèle photo : corps naturel, pickguard noir) ═══
  case'basse':{
    // Corps Jazz Bass vue face légèrement 3/4
    c.fillStyle='#D4A96A';c.strokeStyle='#A07840';c.lineWidth=1.5;
    c.beginPath();
    c.moveTo(4,-6);
    c.bezierCurveTo(18,-6,24,2,24,12);
    c.bezierCurveTo(24,22,16,28,10,32);
    c.bezierCurveTo(4,36,2,42,-4,48);
    c.bezierCurveTo(-10,54,-10,62,-4,66);
    c.bezierCurveTo(2,70,12,72,18,66);
    c.bezierCurveTo(24,60,24,50,18,44);
    c.bezierCurveTo(12,38,12,32,14,24);
    c.bezierCurveTo(16,14,22,6,20,-2);
    c.bezierCurveTo(18,-10,8,-14,4,-6);
    c.closePath();c.fill();c.stroke();
    // Grain bois (lignes)
    c.strokeStyle='rgba(150,100,40,0.3)';c.lineWidth=0.5;
    [2,6,10,14,18].forEach(x=>{
      c.beginPath();c.moveTo(x,-2);c.bezierCurveTo(x+2,20,x-2,50,x,68);c.stroke();
    });
    // Pickguard noir
    c.fillStyle='#1a1a1a';c.strokeStyle='#333';c.lineWidth=0.8;
    c.beginPath();
    c.moveTo(6,2);c.bezierCurveTo(16,0,20,8,20,16);
    c.bezierCurveTo(20,26,14,32,10,36);
    c.bezierCurveTo(6,40,4,44,8,48);
    c.bezierCurveTo(10,44,14,40,12,34);
    c.bezierCurveTo(16,28,18,18,16,10);
    c.bezierCurveTo(14,4,8,4,6,2);
    c.closePath();c.fill();c.stroke();
    // Micros Jazz Bass (2 simples)
    c.fillStyle='#2a2a2a';c.strokeStyle='#555';c.lineWidth=0.8;
    c.beginPath();c.roundRect(-2,14,14,5,1);c.fill();c.stroke();
    c.beginPath();c.roundRect(-2,30,14,5,1);c.fill();c.stroke();
    // Potards (3)
    c.fillStyle='#C0C0C0';c.strokeStyle='#888';c.lineWidth=0.8;
    [46,54,60].forEach(y=>{c.beginPath();c.arc(10,y,3.5,0,Math.PI*2);c.fill();c.stroke();});
    // Sélecteur
    c.fillStyle='#888';c.beginPath();c.roundRect(14,42,4,10,1);c.fill();
    // Manche érable clair
    c.fillStyle='#E8C870';c.strokeStyle='#C09840';c.lineWidth=1;
    c.beginPath();c.roundRect(-2,-6,6,-80,1);
    c.beginPath();c.rect(-2,-6,-2,-76);
    c.beginPath();c.moveTo(-2,-6);c.lineTo(-4,-82);c.lineTo(2,-82);c.lineTo(4,-6);c.closePath();
    c.fill();c.stroke();
    // Repères nacre
    c.fillStyle='rgba(255,255,230,0.9)';
    [-22,-34,-46,-58,-68].forEach(y=>{c.beginPath();c.ellipse(0,y,2.5,1.5,0,0,Math.PI*2);c.fill();});
    // Frettes
    c.strokeStyle='rgba(200,180,120,0.6)';c.lineWidth=0.6;
    [-14,-20,-27,-34,-41,-48,-55,-62,-69,-76].forEach(y=>{
      c.beginPath();c.moveTo(-4,y);c.lineTo(4,y);c.stroke();
    });
    // Tête Jazz Bass
    c.fillStyle='#E8C870';c.strokeStyle='#C09840';c.lineWidth=1;
    c.beginPath();
    c.moveTo(-4,-82);c.lineTo(-5,-94);c.lineTo(-3,-98);c.lineTo(3,-98);c.lineTo(5,-94);c.lineTo(4,-82);
    c.closePath();c.fill();c.stroke();
    // 4 mécaniques (2 par côté)
    c.fillStyle='#C8C8C8';c.strokeStyle='#888';c.lineWidth=0.8;
    [[-4,-86],[4,-86],[-4,-94],[4,-94]].forEach(([mx,my])=>{
      c.beginPath();c.arc(mx,my,2.5,0,Math.PI*2);c.fill();c.stroke();
    });

// Helpers couleur hex
function darkenHex(hex,amt){
  if(!hex||!hex.startsWith('#'))return hex||'#888';
  const r=Math.max(0,parseInt(hex.slice(1,3),16)-amt);
  const g=Math.max(0,parseInt(hex.slice(3,5),16)-amt);
  const b=Math.max(0,parseInt(hex.slice(5,7),16)-amt);
  return`#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
}
function lightenHex(hex,amt){
  if(!hex||!hex.startsWith('#'))return hex||'#888';
  const r=Math.min(255,parseInt(hex.slice(1,3),16)+amt);
  const g=Math.min(255,parseInt(hex.slice(3,5),16)+amt);
  const b=Math.min(255,parseInt(hex.slice(5,7),16)+amt);
  return`#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
}

// ── EVENTS ──
function getPos(e){
  const r=canvas.getBoundingClientRect();
  const src=e.touches?e.touches[0]:e;
  return{x:src.clientX-r.left,y:src.clientY-r.top};
}

function onDown(e){
  const p=getPos(e);
  const pm=toMetre(p.x,p.y);
  if(tool==='select'){
    let found=null;
    for(let i=elements.length-1;i>=0;i--){if(hitTest(elements[i],pm)){found=elements[i];break;}}
    if(found){
      if(!multiSel.includes(found)){if(!e.shiftKey)multiSel=[];selected=found;if(!multiSel.includes(found))multiSel.push(found);}
      const cp=toCanvas(found.type==='line'?found.x:found.x,found.type==='line'?found.y:found.y);
      dragOff={x:p.x-cp.x,y:p.y-cp.y};dragging=true;
    }else{selected=null;multiSel=[];}
    updatePropPanel();draw();
  }else if(tool==='line'){
    lineStart=toMetre(p.x,p.y);
  }else if(tool==='rect'){
    drawStart={x:p.x,y:p.y};isDrawing=true;
  }else if(tool==='text'){
    const t=prompt('Texte :','Label');
    if(t){histPush();const m=toMetre(p.x,p.y);elements.push({type:'text',x:m.x,y:m.y,text:t,color:'#1a1a18',size:13});draw();}
  }
}

function onMove(e){
  const p=getPos(e);
  const pm=toMetre(p.x,p.y);
  document.getElementById('ib-pos').textContent=`x:${Math.max(0,pm.x).toFixed(1)}m y:${Math.max(0,pm.y).toFixed(1)}m`;
  drawCur={x:p.x,y:p.y};
  if(dragging&&selected){
    const nm=toMetre(p.x-dragOff.x,p.y-dragOff.y);
    if(selected.type==='line'){
      const dx=nm.x-selected.x,dy=nm.y-selected.y;
      selected.x+=dx;selected.y+=dy;selected.x2+=dx;selected.y2+=dy;
    }else{
      const c=clampScene(snapV(nm.x),snapV(nm.y));
      selected.x=c.x;selected.y=c.y;
    }
    draw();
  }
  if(tool==='line'&&lineStart||tool==='rect'&&isDrawing)draw();
}

function onUp(e){
  const p=getPos(e);
  if(tool==='line'&&lineStart){
    const en=toMetre(p.x,p.y);
    if(Math.abs(en.x-lineStart.x)>0.3||Math.abs(en.y-lineStart.y)>0.3){
      histPush();elements.push({type:'line',x:lineStart.x,y:lineStart.y,x2:en.x,y2:en.y,color:'rgba(80,60,40,0.6)'});
    }
    lineStart=null;draw();
  }
  if(tool==='rect'&&isDrawing){
    const s=toMetre(drawStart.x,drawStart.y);
    const en=toMetre(p.x,p.y);
    const rw=Math.abs(en.x-s.x),rh=Math.abs(en.y-s.y);
    if(rw>0.3&&rh>0.3){
      const lbl=prompt('Nom (vide=aucun):','Riser')||'';
      histPush();elements.push({type:'rect',x:Math.min(s.x,en.x),y:Math.min(s.y,en.y),rw,rh,label:lbl,color:'#8A7050',fill:'rgba(180,155,110,0.25)',rotation:0});
    }
    isDrawing=false;draw();
  }
  if(dragging){histPush();dragging=false;}
}

function onDblClick(e){
  const p=getPos(e);const pm=toMetre(p.x,p.y);
  for(let i=elements.length-1;i>=0;i--){
    if(hitTest(elements[i],pm)){selected=elements[i];showSideTab('props',document.querySelectorAll('.stab')[1]);updatePropPanel();return;}
  }
}

function onDrop(e){
  e.preventDefault();e.stopPropagation();
  if(dropCooldown)return;
  dropCooldown=true;setTimeout(()=>{dropCooldown=false;},200);
  const type=e.dataTransfer.getData('text')||libDragType;
  libDragType=null;
  if(!type)return;
  const r=canvas.getBoundingClientRect();
  const pm=toMetre(e.clientX-r.left,e.clientY-r.top);
  const cl=clampScene(snapV(pm.x),snapV(pm.y));
  // Image personnalisée
  if(type.startsWith('custom:')){
    const imgId=type.slice(7);
    const meta=(S.customImages||[]).find(i=>i.id===imgId);
    if(!meta)return;
    getImageForCanvas(imgId).then(()=>{
      histPush();
      const shortName=meta.name.length>20?meta.name.slice(0,18)+'…':meta.name;
      elements.push({type:'custom-img',customId:imgId,x:cl.x,y:cl.y,label:shortName,color:'#888780',rotation:0,flip:false,scale:1});
      selected=elements[elements.length-1];multiSel=[selected];
      updatePropPanel();draw();
      toast('✅ '+shortName);
    });
    return;
  }
  addElement(type,cl.x,cl.y);
}

function onKey(e){
  if(['INPUT','TEXTAREA','SELECT'].includes(document.activeElement.tagName))return;
  if(e.key==='Delete'||e.key==='Backspace'){e.preventDefault();deleteSelected();}
  if((e.ctrlKey||e.metaKey)&&e.key==='z'){e.preventDefault();sceneUndo();}
  if((e.ctrlKey||e.metaKey)&&(e.key==='y'||(e.shiftKey&&e.key==='z'))){e.preventDefault();sceneRedo();}
  if(e.key==='s'&&!e.ctrlKey)setTool('select');
  if(e.key==='c'&&!e.ctrlKey)setTool('line');
  if(e.key==='r'&&!e.ctrlKey)setTool('rect');
  if(e.key==='t'&&!e.ctrlKey)setTool('text');
  if(e.key==='Escape'){selected=null;multiSel=[];draw();}
}

function hitTest(el,pm){
  if(el.type==='line'){
    const dx=((el.x2||el.x)-el.x),dy=((el.y2||el.y)-el.y);
    const t=Math.max(0,Math.min(1,((pm.x-el.x)*dx+(pm.y-el.y)*dy)/(dx*dx+dy*dy+.001)));
    return Math.hypot(pm.x-el.x-t*dx,pm.y-el.y-t*dy)<0.4;
  }
  if(el.type==='text')return Math.abs(pm.x-el.x)<1&&Math.abs(pm.y-el.y)<0.7;
  if(el.type==='rect')return pm.x>=el.x&&pm.x<=el.x+(el.rw||1)&&pm.y>=el.y&&pm.y<=el.y+(el.rh||1);
  if(el.type==='custom-img'){const s=(el.scale||1)*0.56/SR.scale*50;return Math.hypot(pm.x-el.x,pm.y-el.y)<s;}
  const r=0.56/SR.scale*50;
  return Math.hypot(pm.x-el.x,pm.y-el.y)<r;
}

}
function toggleSnap(){snapOn=!snapOn;document.getElementById('btn-snap').classList.toggle('active',snapOn);}
function toggleLabels(){showLabels=!showLabels;document.getElementById('btn-labels').classList.toggle('active',showLabels);draw();}
function toggleGrid(){showGrid=!showGrid;document.getElementById('btn-grid').classList.toggle('active',showGrid);draw();}
function deleteSelected(){
  if(!selected)return;
  histPush();const t=multiSel.length>1?multiSel:[selected];
  elements=elements.filter(e=>!t.includes(e));selected=null;multiSel=[];updatePropPanel();draw();
}
function rotateSelected(){if(!selected)return;histPush();selected.rotation=((selected.rotation||0)+45)%360;draw();}
function flipSelected(){if(!selected||['line','rect','text'].includes(selected.type))return;histPush();selected.flip=!selected.flip;draw();}
function bringFront(){if(!selected)return;histPush();elements=elements.filter(e=>e!==selected);elements.push(selected);draw();}
function sendBack(){if(!selected)return;histPush();elements=elements.filter(e=>e!==selected);elements.unshift(selected);draw();}

// ── AJOUTER ÉLÉMENT ──
let addCooldown=false;
function addElement(type,mx,my){

function setProp(k,v){if(!selected)return;selected[k]=v;draw();}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ── HISTORIQUE ──
function histPush(){
  const snap=JSON.stringify(elements);
  if(hist.length&&hist[histIdx]===snap)return;
  hist=hist.slice(0,histIdx+1);hist.push(snap);
  if(hist.length>60)hist.shift();
  histIdx=hist.length-1;updateUndoBtns();
}
function sceneUndo(){if(histIdx<=0)return;histIdx--;elements=JSON.parse(hist[histIdx]);selected=null;multiSel=[];draw();updateUndoBtns();}
function sceneRedo(){if(histIdx>=hist.length-1)return;histIdx++;elements=JSON.parse(hist[histIdx]);draw();updateUndoBtns();}
function updateUndoBtns(){
  document.getElementById('btn-undo').style.opacity=histIdx>0?'1':'0.35';
  document.getElementById('btn-redo').style.opacity=histIdx<hist.length-1?'1':'0.35';
}

// ── SCÈNES ──
function updateSceneSelect(){
  const sel=document.getElementById('scene-select');if(!sel)return;
  const sc=S.stageScenes||{};
  sel.innerHTML='<option value="">— Nouvelle scène —</option>'+
    Object.keys(sc).map(n=>`<option value="${esc(n)}" ${sceneName===n?'selected':''}>${esc(n)}</option>`).join('');
}

function loadSceneByName(name){
  if(!name){sceneName='';elements=[];histPush();draw();return;}
  const sc=S.stageScenes||{};
  if(!sc[name])return;
  try{elements=JSON.parse(sc[name].elements||'[]');}catch(e){elements=[];}
  if(sc[name].sceneW)sceneW=sc[name].sceneW;
  if(sc[name].sceneH)sceneH=sc[name].sceneH;
  sceneName=name;selected=null;multiSel=[];
  computeScene();histPush();draw();
  toast('Scène "'+name+'" chargée');
}

function newScene(){
  if(elements.length>0){
    if(confirm('Sauvegarder "'+( sceneName||'scène en cours')+'" avant de créer une nouvelle scène ?')){
      saveScene();
    }
  }
  const name=prompt('Nom de la nouvelle scène :','');
  if(name===null)return;
  sceneName=name;elements=[];histPush();draw();updateSceneSelect();
  if(name)toast('Nouvelle scène "'+name+'" créée');
}

function saveScene(){
  const name=sceneName||prompt('Nom de la scène :','Ma scène');
  if(!name)return;
  sceneName=name;
  if(!S.stageScenes)S.stageScenes={};
  S.stageScenes[name]={elements:JSON.stringify(elements),sceneW,sceneH,date:new Date().toISOString().slice(0,10)};
  if(!S.scenes)S.scenes={};
  S.scenes[name]=JSON.stringify(elements);
  save();updateSceneSelect();
  toast('Scène "'+name+'" sauvegardée');
}

function deleteScene(){
  if(!sceneName){toast('Aucune scène sélectionnée');return;}
  if(!confirm('Supprimer "'+sceneName+'" ?'))return;
  delete S.stageScenes[sceneName];
  delete S.scenes[sceneName];
  sceneName='';elements=[];save();updateSceneSelect();draw();toast('Scène supprimée');
}

function importFromFiche(){
  const fiches=S.fiches||[];
  if(!fiches.length){toast('Aucune fiche dans SonoManager');return;}
  document.getElementById('modal-root').innerHTML=`<div class="overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">

        <div class="field"><label>Sélectionner la fiche</label>
          <select id="fiche-sel">${fiches.map(f=>`<option value="${f.id}">${esc(f.artiste||'Fiche '+(f.id))} (${(f.canaux||[]).length} canaux)</option>`).join('')}</select>
        </div>
      </div>
      <div class="modal-foot">
        <button class="btn" onclick="closeModal()">Annuler</button>
        <button class="btn primary" onclick="doImportFiche()">Importer</button>
      </div>
    </div></div>`;
}

function doImportFiche(){
  const id=parseInt(document.getElementById('fiche-sel').value);
  const f=(S.fiches||[]).find(x=>x.id===id);
  if(!f){closeModal();return;}
  histPush();
  const canaux=f.canaux||[],retours=f.retours||[];
  const typeMap=[
    {k:['batterie','drums','kick'],t:'batterie'},{k:['cajun','cajon'],t:'cajun'},
    {k:['basse','bass'],t:'basse'},{k:['guitare','guitar'],t:'guitare'},
    {k:['clavier','keyboard','piano','keys'],t:'clavier'},{k:['saxo','saxophone'],t:'saxophone'},
    {k:['trompette','trumpet'],t:'trompette'},{k:['trombone'],t:'trombone'},
    {k:['contrebasse'],t:'contrebasse'},{k:['violon','violin'],t:'violon'},
    {k:['voix','chant','vocal','voc','lead'],t:'micro'},{k:['congas'],t:'congas'},
  ];
  const total=Math.max(canaux.length,1);
  canaux.forEach((ch,i)=>{
    const nom=(ch.nom||'').toLowerCase();
    let iconType='micro';
    for(const{k,t} of typeMap){if(k.some(kw=>nom.includes(kw))){iconType=t;break;}}
    const t=total>1?i/(total-1):0.5;
    const x=parseFloat((sceneW*0.12+t*sceneW*0.76).toFixed(2));
    const y=parseFloat((sceneH*0.28+Math.sin(t*Math.PI)*sceneH*0.2).toFixed(2));
    elements.push({type:iconType,x,y,label:ch.nom||('CH'+(i+1)),chan:i+1,color:getTypeColor(iconType),rotation:0,flip:false,note:ch.micro||''});
  });
  retours.forEach((r,i)=>{
    const x=parseFloat((retours.length>1?sceneW*0.1+i*(sceneW*0.8/(retours.length-1)):sceneW/2).toFixed(2));
    elements.push({type:'retour',x,y:parseFloat((sceneH*0.82).toFixed(2)),label:r.musicien||('Retour '+(i+1)),color:'#185FA5',rotation:0,flip:false});
  });
  closeModal();setTimeout(()=>draw(),50);
  toast('✅ '+canaux.length+' instruments + '+retours.length+' retours importés');
}

// IndexedDB pour les images (base64 trop grosse pour Firebase)
let _idb=null;
function openIDB(){
  return new Promise((res,rej)=>{
    if(_idb)return res(_idb);
    const req=indexedDB.open('StageManagerImages',1);
    req.onupgradeneeded=e=>{e.target.result.createObjectStore('images',{keyPath:'id'});};
    req.onsuccess=e=>{_idb=e.target.result;res(_idb);};
    req.onerror=()=>rej('IDB error');
  });
}
async function idbSet(id,data){
  const db=await openIDB();
  return new Promise((res,rej)=>{
    const tx=db.transaction('images','readwrite');
    tx.objectStore('images').put({id,data});
    tx.oncomplete=res;tx.onerror=rej;
  });
}
async function idbGet(id){
  const db=await openIDB();
  return new Promise((res,rej)=>{
    const tx=db.transaction('images','readonly');
    const req=tx.objectStore('images').get(id);
    req.onsuccess=()=>res(req.result?.data||null);
    req.onerror=rej;
  });
}
async function idbDel(id){
  const db=await openIDB();
  return new Promise((res,rej)=>{
    const tx=db.transaction('images','readwrite');
    tx.objectStore('images').delete(id);
    tx.oncomplete=res;tx.onerror=rej;
  });
}

// Métadonnées images (sauvées dans Firebase via S.customImages)
function getCustomImages(){return S.customImages||[];}

function renderCustomLib(){
  const el=document.getElementById('custom-lib');if(!el)return;
  const imgs=getCustomImages();
  if(!imgs.length){
    el.innerHTML=`<div style="padding:16px 10px;text-align:center;font-size:12px;color:var(--text3)">
      Aucune image importée.<br>Cliquez "＋ Importer" pour ajouter vos propres instruments.
    </div>`;
    return;
  }
  el.innerHTML=imgs.map(img=>{
    const shortName=img.name.length>20?img.name.slice(0,18)+'…':img.name;
    return`<div style="display:flex;align-items:center;gap:8px;padding:6px 10px;cursor:pointer;border-radius:6px;margin:1px 5px;transition:background .1s" 
      class="lib-item" data-custom-id="${img.id}" draggable="true"
      onclick="addCustomElement('${img.id}')"
      ondragstart="libDragType='custom:${img.id}';try{event.dataTransfer.setData('text','custom:${img.id}');}catch(_){}">
      <div id="thumb-${img.id}" style="width:36px;height:36px;border-radius:6px;background:var(--gray-lt);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--text3)">…</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${esc(img.name)}">${esc(shortName)}</div>
        <div style="font-size:10px;color:var(--text3)">${img.cat||'Perso'}</div>
      </div>
      <button class="btn sm danger" onclick="event.stopPropagation();deleteCustomImage('${img.id}')" style="flex-shrink:0;padding:3px 6px">✕</button>
    </div>`;
  }).join('');
  // Charger les thumbnails
  imgs.forEach(async img=>{
    const data=await idbGet(img.id);
    if(!data)return;
    const el2=document.getElementById('thumb-'+img.id);
    if(el2){
      const i=new Image();i.src=data;i.style='width:100%;height:100%;object-fit:contain';
      el2.innerHTML='';el2.appendChild(i);
    }
  });
}

function importCustomImage(){
  const input=document.createElement('input');
  input.type='file';
  input.accept='image/*';
  input.multiple=true;
  input.onchange=async e=>{
    const files=[...e.target.files];
    if(!files.length)return;
    for(const file of files){
      await processCustomImage(file);
    }
    renderCustomLib();
    toast(`✅ ${files.length} image${files.length>1?'s':''} importée${files.length>1?'s':''}`);
  };
  input.click();
}

async function processCustomImage(file){
  const id='custom_'+Date.now()+'_'+Math.random().toString(36).slice(2,6);
  // Nettoyer le nom : supprimer extension, tirets/underscores → espaces, capitaliser
  let name=file.name.replace(/\.[^.]+$/,'').replace(/[-_]/g,' ');
  // Tronquer à 20 chars
  if(name.length>20)name=name.slice(0,18)+'…';
  name=name.charAt(0).toUpperCase()+name.slice(1);
  // Lire l'image
  const data=await new Promise(res=>{
    const r=new FileReader();
    r.onload=ev=>res(ev.target.result);
    r.readAsDataURL(file);
  });
  // Redimensionner si trop grande (max 512px)
  const resized=await resizeImage(data,512);
  // Sauver dans IDB
  await idbSet(id,resized);
  // Métadonnées dans Firebase
  if(!S.customImages)S.customImages=[];
  S.customImages.push({id,name,cat:'Perso',date:new Date().toISOString().slice(0,10)});
  save();
}

function resizeImage(dataUrl,maxSize){
  return new Promise(res=>{
    const img=new Image();
    img.onload=()=>{
      let w=img.width,h=img.height;
      if(w>maxSize||h>maxSize){
        if(w>h){h=Math.round(h*maxSize/w);w=maxSize;}
        else{w=Math.round(w*maxSize/h);h=maxSize;}
      }
      const c=document.createElement('canvas');c.width=w;c.height=h;
      const cx=c.getContext('2d');cx.drawImage(img,0,0,w,h);
      res(c.toDataURL('image/webp',0.85));
    };
    img.src=dataUrl;
  });
}

async function deleteCustomImage(id){
  if(!confirm('Supprimer cette image ?'))return;
  await idbDel(id);
  S.customImages=(S.customImages||[]).filter(i=>i.id!==id);
  save();renderCustomLib();toast('Image supprimée');
}

// Cache des images chargées pour le canvas
const _imgCache={};
async function getImageForCanvas(id){
  if(_imgCache[id])return _imgCache[id];
  const data=await idbGet(id);
  if(!data)return null;
  return new Promise(res=>{
    const img=new Image();
    img.onload=()=>{_imgCache[id]=img;res(img);};
    img.src=data;
  });
}

function addCustomElement(imgId){
  const meta=(S.customImages||[]).find(i=>i.id===imgId);
  if(!meta)return;
  const shortName=meta.name.length>20?meta.name.slice(0,18)+'…':meta.name;
  // Précharger l'image puis placer
  getImageForCanvas(imgId).then(()=>{
    const x=parseFloat((sceneW*0.2+Math.random()*sceneW*0.6).toFixed(2));
    const y=parseFloat((sceneH*0.2+Math.random()*sceneH*0.6).toFixed(2));
    histPush();
    elements.push({type:'custom-img',customId:imgId,x,y,label:shortName,color:'#888780',rotation:0,flip:false,scale:1});
    selected=elements[elements.length-1];multiSel=[selected];
    updatePropPanel();draw();
    toast('✅ '+shortName);
  });
}

// ── TOAST ──
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2500);
}
function closeModal(){document.getElementById('modal-root').innerHTML='';}
